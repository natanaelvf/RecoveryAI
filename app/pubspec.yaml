name: missed_lead_recovery
description: "Missed-Lead Recovery - contractor mobile app"
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any

  # State management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Charts
  fl_chart: ^0.70.2

  # HTTP (for future API integration)
  dio: ^5.7.0

  # Fonts
  google_fonts: ^6.2.1

  # Phone/URL launching
  url_launcher: ^6.3.1

  # Supabase Auth
  supabase_flutter: ^2.8.0

  # Native Google Sign-In
  google_sign_in: ^6.2.2

  # Environment config
  flutter_dotenv: ^5.2.1

  # Firebase
  firebase_core: ^3.13.0
  firebase_messaging: ^15.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  generate: true
  assets:
    - .env.dev
    - .env.prod
