# fly.toml app configuration file generated for unmissed-kzw83g on 2026-05-28T12:24:40Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'unmissed-kzw83g'
primary_region = 'fra'

[build]
  dockerfile = 'Dockerfile'

[env]
  NODE_ENV = 'production'
  PORT = '3000'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']
  checks = [{ grace_period = '10s', interval = '30s', method = 'get', path = '/health', protocol = 'http', timeout = '5s' }]
  concurrency = { hard_limit = 250, soft_limit = 200, type = 'requests' }

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 250
    soft_limit = 200

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'get'
    path = '/health'
    protocol = 'http'

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
  processes = ['app']
  size = 'shared-cpu-1x'
